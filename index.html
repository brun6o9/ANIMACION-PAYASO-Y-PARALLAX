<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOKU</title>

    <style>

        *{
            margin:0px;
            padding:0px;
        }

        body{
            background-color:black;
        }

        .contenedor{
            width:400px;
            height:700px;
            border:1px solid white;
            overflow:hidden;
            margin:0 auto;
            position:relative;
        }


        .cielo{
            width:700px;
            height:300px;
            position:absolute;
            left:-150px;
            top:0px;
            z-index:2;

            animation:cielo 30s infinite forwards;
        }

        @keyframes cielo{

            from{
                transform:scale(1.4);
                filter:blur(5px);
            }

            to{
                transform:scale(1.5);
                filter:blur(0px);
            }

        }


        .fondo{
            width:900px;
            height:500px;
            position:absolute;
            left:-250px;
            top:180px;
            z-index:1;

            animation:fondo 20s 1 forwards;
        }

        @keyframes fondo{

            from{
                top:220px;
                filter:blur(2px);
            }

            to{
                top:180px;
                filter:blur(0px);
            }

        }


        .persona{
            width:430px;
            position:absolute;
            left:-20px;
            top:250px;
            z-index:3;

            animation:persona 10s 1 forwards;
        }

        @keyframes persona{

            from{
                top:320px;
                transform:scale(0.7);
                filter:grayscale(100%);
            }

            to{
                top:230px;
                transform:scale(1);
                filter:grayscale(0%);
            }

        }


        .vapor{
            width:350px;
            position:absolute;
            left:20px;
            top:180px;
            z-index:4;

            animation:vapor 10s 1 forwards;
        }

        @keyframes vapor{

            from{
                left:20px;
                opacity:0;
            }

            to{
                left:0px;
                opacity:1;
            }

        }

    </style>

</head>

<body>

    <div class="contenedor">

        <img class="fondo" src="img/paisaje.png" alt="">

        <img class="cielo" src="img/cielo.jpg" alt="">

        <img class="persona" src="img/personaje.png" alt="">

        <img class="vapor" src="img/aura.png" alt="">

    </div>

</body>
</html>
